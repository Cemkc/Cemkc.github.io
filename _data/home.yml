project_entries:
  - title: Ovis Game Engine & Match Stranded
    url: /ovis/
    desc: A match 2 game made with a custom 2D game engine built from scratch utilizing C++ and OpenGL, featuring batch rendering and custom raycasting.

  - title: Futuregames Game Projects
    url: /futuregames-projects/
    desc: Programming Lead & AI Programmer on two award-winning Unity games (1st and 2nd place), developed in rapid 1-month production cycles with 12-person cross-functional teams.

  - title: 3D Scene Optimization with Octree
    url: /octree-optimization/
    desc: A custom C++ and OpenGL application demonstrating advanced spatial partitioning by implementing an Octree algorithm from scratch to solve O(n²) CPU bottlenecks.

  - title: Vampire Survivors 3D Clone (Unity ECS)
    url: /vampire-survivors/
    desc: A high-density 3D survival game architected entirely with Unity ECS and Data-Oriented Programming (DOP) to handle massive entity counts at high frame rates.

  - title: Project Mavata (Venture)
    url: /project-mavata/
    desc: A mobile 2.5D fighting game developed over 1.5 years inside the BUG Lab TEKMER incubator. Features custom Unity editor tools, AI Behavior Trees, and deterministic netcode architecture.

